server:
  # 开发环境端口
  port: 8080

spring:
  datasource:
    # 本地数据库地址
    url: jdbc:mysql://localhost:3306/test_db
    username: root
    password: 1123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    # 自动更新数据库表结构（开发环境常用 update，生产环境建议 none）
    hibernate:
      ddl-auto: update
    # 在控制台打印 SQL 语句
    show-sql: true
    # 格式化输出的 SQL
    properties:
      hibernate:
        format_sql: true